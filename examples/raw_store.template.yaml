# raw_store.template.yaml
#
# Copy this file to your local path (outside the repo) and rename it raw_store.yaml.
# Fill in one entry per extraction session. Append; never overwrite.
#
# Rules:
#   - raw_* fields: verbatim only. No summaries, no labels, no interpretation.
#   - object_tag: relationship type only (e.g. "동료", "부모"). No names.
#   - Do not commit this file if it contains real personal data.

user_metadata:
  demographics:
    age_group: ""                    # [Optional] e.g. "20s", "30s" (For fairness/bias testing)
    gender: ""                       # [Optional] e.g. "Male", "Female", "Other"
    cultural_background: ""          # [Optional] e.g. "Korean", "Western"

entries:
  # ── CCRT (Core Conflictual Relationship Theme) ──────────────────────────────
  - id: ccrt0001
    ts: 2026-01-01T12:00:00+09:00
    method: ccrt
    object_tag: ""                    # e.g. "동료", "파트너", "부모"
    raw_wish: ""                      # what you wanted from the other person
    raw_response_other: ""            # what they actually did (your perception)
    raw_response_self: ""             # how you reacted
    raw_recurrence: ""                # does this pattern repeat elsewhere?

  # ── Laddering ────────────────────────────────────────────────────────────────
  - id: l0001
    ts: 2026-01-01T12:00:00+09:00
    method: laddering
    target_axis_from_event: ""        # id of the triadic entry that prompted this (pointer only)
    selection_reason: ""              # why this axis was chosen (e.g. "Dilemma", "high saliency")
    verbatim_chain:                   # user answers only, in order — drop LLM questions
      - ""
      - ""
      - ""
    boundary_exception: ""            # when does this value NOT apply?

  # ── Triadic Elicitation ──────────────────────────────────────────────────────
  - id: t0001
    ts: 2026-01-01T12:00:00+09:00
    method: triadic
    domain: ""                        # work / relation / daily / self (unlock domain tag)
    round: 1
    elements_shown: ["", "", ""]      # the three elements presented
    odd_one: ""                       # which one felt different
    raw_negative: ""                  # verbatim: what makes the odd one different (negative pole)
    raw_positive: ""                  # verbatim: what the other two share (positive pole)
    grid_row: []                      # ratings 1–7 across all elements on this axis
    selection_audit:
      dispersion_score: 0.0
      saliency_sum: 0

  # ── Feared Self ──────────────────────────────────────────────────────────────
  - id: fs0001
    ts: 2026-01-01T12:00:00+09:00
    method: feared_self
    domain: general                   # general / work / relation
    raw_feared: ""                    # verbatim description of feared-self state
    raw_early_warning: []             # list of earliest behavioral signals you notice (verbatim)
    raw_defense: ""                   # what you do to avoid it
    raw_reality_check: ""             # [Optional] a past moment when feared-self activated — what happened

  # ── Mini ESM (Experience Sampling) ──────────────────────────────────────────
  - id: esm0001
    ts: 2026-01-01T12:00:00+09:00
    method: esm
    context: ""                       # what were you doing
    data_type: enacted_proximal       # to distinguish from self_report
    affect_valence: 0                 # −3 (very negative) to +3 (very positive)
    affect_arousal: 0                 # 0 (calm) to 3 (activated)
    raw_thought: ""                   # verbatim: what was on your mind
    raw_trigger: ""                   # what preceded this state
    raw_body: ""                      # any physical sensation noticed

  # ── Value Allocation (맥락 속 가치 할당) ────────────────────────────────────
  - id: va0001
    ts: 2026-01-01T12:00:00+09:00
    method: value_allocation
    context: ""                       # e.g. work_crisis_scenario
    allocations:                      # verbatim value name and points (must sum to 100)
      - {raw_verbatim: "", points: 0}
      - {raw_verbatim: "", points: 0}
    flip_condition:                   # exception condition to flip top/bottom values
      top_value: ""
      bottom_value: ""
      raw_condition: ""

  # ── Metaphor / SCT (생성 은유와 문장 완성) ───────────────────────────────────
  - id: met0001
    ts: 2026-01-01T12:00:00+09:00
    method: metaphor                  # or sct
    domain: ""                        # e.g. career, relationship
    prompt: ""                        # e.g. "나에게 나의 커리어는 [ ]다"
    raw: ""                           # the user's verbatim completion

  # ── Judgment Scenario (판단 스타일 시나리오) ─────────────────────────────────
  - id: js0001
    ts: 2026-01-01T12:00:00+09:00
    method: judgment_scenario
    scenario: ""                      # the dilemma presented
    raw_missing_info: ""              # verbatim: what else do you need to know?
    raw_tiebreaker: ""                # verbatim: the single ultimate criterion

  # ── Self-Other (자기-타자) ───────────────────────────────────────────────────
  - id: so0001
    ts: 2026-01-01T12:00:00+09:00
    method: self_other
    value: ""                         # the value or trait in question
    raw_self_definition: ""           # verbatim: what it means to you
    raw_other_estimation: ""          # verbatim: what your colleague would say it means

  # ── Life Scene (대표 인생 장면) ──────────────────────────────────────────────
  - id: ls0001
    ts: 2026-01-01T12:00:00+09:00
    method: life_scene
    data_type: self_report            # explicitly marked as retrospective self-report
    time_tag: ""                      # when did this happen
    timeline_order: 1                 # relative chronological order
    raw_scene_summary: ""             # verbatim: the objective scene
    raw_meaning: ""                   # verbatim: what it meant to you

  # ── CIT (자기 보고식 사건 분석) ───────────────────────────────────────────────
  - id: cit0001
    ts: 2026-01-01T12:00:00+09:00
    method: cit
    domain: ""                        # e.g. work
    data_type: self_report
    raw_incident: ""                  # the specific past event
    raw_problem: ""                   # what the core problem was
    raw_response: ""                  # what you did
    raw_outcome: ""                   # [Optional] what happened as a result
